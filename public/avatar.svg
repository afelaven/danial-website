<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustrated portrait of Danial Haikal">
  <defs>
    <radialGradient id="bg" cx="30%" cy="18%" r="95%">
      <stop offset="0%" stop-color="#16323a"/>
      <stop offset="55%" stop-color="#101c2c"/>
      <stop offset="100%" stop-color="#0b1420"/>
    </radialGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28394d"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20242c"/>
      <stop offset="100%" stop-color="#101318"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="120" cy="120" r="120"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circle)">
    <!-- background -->
    <rect width="240" height="240" fill="url(#bg)"/>
    <circle cx="120" cy="120" r="119" fill="none" stroke="#5eead4" stroke-opacity="0.14" stroke-width="2"/>

    <!-- shoulders / shirt -->
    <path d="M120 158 C88 158 62 176 54 204 L54 240 L186 240 L186 204 C178 176 152 158 120 158 Z" fill="url(#shirt)"/>
    <!-- collar accent -->
    <path d="M98 165 L120 186 L142 165" fill="none" stroke="#5eead4" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- neck -->
    <path d="M106 138 L134 138 L134 164 C134 172 126 176 120 176 C114 176 106 172 106 164 Z" fill="#b97f52"/>
    <path d="M106 144 C110 152 130 152 134 144 L134 150 C128 156 112 156 106 150 Z" fill="#9c6842" opacity="0.7"/>

    <!-- ears -->
    <ellipse cx="74" cy="106" rx="7" ry="11" fill="#b97f52"/>
    <ellipse cx="166" cy="106" rx="7" ry="11" fill="#b97f52"/>
    <ellipse cx="74.5" cy="106" rx="3" ry="5.5" fill="#9c6842" opacity="0.75"/>
    <ellipse cx="165.5" cy="106" rx="3" ry="5.5" fill="#9c6842" opacity="0.75"/>

    <!-- face -->
    <path d="M78 88 C78 60 96 46 120 46 C144 46 162 60 162 88 L162 108 C162 134 144 152 120 152 C96 152 78 134 78 108 Z" fill="#c68b59"/>

    <!-- hair: neat short crop with side fade -->
    <path d="M74 100 C72 62 94 40 120 40 C146 40 168 62 166 100 L162 100 C162 84 158 76 152 70 C142 78 100 80 88 68 C82 74 78 84 78 100 Z" fill="url(#hair)"/>
    <path d="M88 68 C100 80 142 78 152 70 C146 60 134 54 120 54 C106 54 94 58 88 68 Z" fill="#181c23"/>

    <!-- brows -->
    <path d="M88 96 C94 92 104 92 109 95" fill="none" stroke="#2a2e36" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M131 95 C136 92 146 92 152 96" fill="none" stroke="#2a2e36" stroke-width="4.5" stroke-linecap="round"/>

    <!-- glasses -->
    <g stroke="#22303e" stroke-width="4" fill="rgba(94,234,212,0.06)">
      <rect x="82" y="100" width="34" height="26" rx="9"/>
      <rect x="124" y="100" width="34" height="26" rx="9"/>
    </g>
    <path d="M116 110 L124 110" stroke="#22303e" stroke-width="4" stroke-linecap="round"/>
    <path d="M82 108 L74 104 M158 108 L166 104" stroke="#22303e" stroke-width="4" stroke-linecap="round"/>
    <!-- lens glint -->
    <path d="M88 106 L96 120" stroke="#5eead4" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
    <path d="M130 106 L138 120" stroke="#5eead4" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>

    <!-- eyes -->
    <circle cx="99" cy="113" r="3.6" fill="#1c1f26"/>
    <circle cx="141" cy="113" r="3.6" fill="#1c1f26"/>

    <!-- nose -->
    <path d="M120 112 C119 120 117 124 115 127 C117 130 123 130 125 127" fill="none" stroke="#a06b43" stroke-width="3" stroke-linecap="round"/>

    <!-- smile -->
    <path d="M106 136 C112 142 128 142 134 136" fill="none" stroke="#8a5a36" stroke-width="3.5" stroke-linecap="round"/>

    <!-- facial hair: light neat stubble accent -->
    <path d="M100 146 C108 151 132 151 140 146" fill="none" stroke="#2a2e36" stroke-opacity="0.25" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
